            const [isOpen, setIsOpen] = useState(false);

            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatContainerRef = useRef(null);

            const generateAIResponse = async (userMessage) => {
                const apiKey = ""; // The platform injects the API key at runtime
                const model = "gemini-2.5-flash-preview-09-2025";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

                // Feeding the AI your portfolio data
                const systemPrompt = `You are the AI assistant for Gibin G's professional portfolio website. 
                Answer questions concisely, professionally, and enthusiastically based ONLY on the following data. 
                Use plain text only, no markdown formatting (do not use asterisks for bolding).
                Do NOT make up any information.
                Name: ${profile.name}
                Title: ${profile.title}
                Location: ${profile.location}
                Visa Status: ${profile.status}
                Email: ${profile.email}
                Phone: ${profile.phone}

                Education: ${JSON.stringify(education)}
                
                If the user asks something unrelated to Gibin's professional profile, politely steer the conversation back to his qualifications. Encourage them to contact him directly for interviews.`;

                const payload = {
                    contents: [{ parts: [{ text: userMessage }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error('API Error');
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm sorry, I couldn't process that.";
                    } catch (error) {
                        if (retries > 0) {
                            await new Promise(res => setTimeout(res, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        }
                        return "I'm currently experiencing network interference. Please contact Gibin directly via email or phone.";
                    }
                };

                return await fetchWithRetry();
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || isTyping) return;
                
                const userMsg = input.trim();
                setMessages(prev => [...prev, { type: 'user', text: userMsg }]);
                setInput('');
                setIsTyping(true);

                const aiResponse = await generateAIResponse(userMsg);
                
                setMessages(prev => [...prev, { type: 'bot', text: aiResponse }]);
                setIsTyping(false);
            };

            // SAFELY SCROLL CONTAINER ONLY
            useEffect(() => { 
                if (chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
            }, [messages, isTyping]);

            return (
                <>
                    <div className="fixed bottom-6 right-6 z-50 group">
                        {showNotification && !isOpen && (
                            <div className="absolute bottom-full right-0 mb-3 w-40 bg-white text-slate-900 text-xs font-bold p-2 rounded-lg shadow-xl animate-bounce text-center">Hiring? Ask AI!<div className="absolute bottom-[-6px] right-6 w-3 h-3 bg-white rotate-45"></div></div>

                                <span className="text-xs text-slate-500 font-mono">GEMINI 2.5</span>
                            </div>
                            <div ref={chatContainerRef} className="flex-1 p-4 h-80 overflow-y-auto bg-slate-950/50 custom-scrollbar space-y-3">
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`flex ${msg.type === 'user' ? 'justify-end' : 'justify-start'}`}>

                                    </div>
                                ))}
                                {isTyping && (
                                    <div className="flex justify-start">
                                        <div className="bg-slate-800 border border-slate-700 text-slate-400 p-3 rounded-lg rounded-bl-none text-xs flex gap-1">
                                            <span className="animate-bounce">.</span><span className="animate-bounce" style={{animationDelay: '100ms'}}>.</span><span className="animate-bounce" style={{animationDelay: '200ms'}}>.</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="p-2 bg-slate-900/50 flex gap-2 border-t border-slate-800">
                                <a href={`tel:${profile.phone}`} className="text-[10px] bg-slate-800 text-white px-3 py-1 rounded-full hover:bg-slate-700 transition-colors">📞 Call Me</a>

                            </div>
                            <form onSubmit={handleSend} className="p-3 bg-slate-900 border-t border-slate-800 flex items-center gap-2">
                                <input type="text" disabled={isTyping} value={input} onChange={(e) => setInput(e.target.value)} placeholder={isTyping ? "AI is generating..." : "Ask about my skills..."} className="flex-1 bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 disabled:opacity-50" />
                                <button type="submit" disabled={isTyping || !input.trim()} className="p-2 bg-emerald-600 text-white rounded hover:bg-emerald-500 disabled:opacity-50 transition-colors"><Icon name="Send" className="w-4 h-4" /></button>
                            </form>
                        </div>
                    )}
                </>
            );
        };

        const VideoPlayer = ({ playlist }) => {

        const Footer = () => (

                <p>© {new Date().getFullYear()} {profile.name}. All systems operational.</p>
                <p className="mt-2 text-xs opacity-50">Built with React + Tailwind CSS</p>

        function App() {
            // No loading states, no timeouts, no scroll locks. Pure instant loading.
            return (
                <div className="min-h-screen bg-slate-950 text-slate-300 font-sans selection:bg-emerald-500/30">
                    <ScrollProgress />
                    <div className="fixed inset-0 z-0 pointer-events-none opacity-20" style={{ backgroundImage: 'linear-gradient(rgba(16, 185, 129, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.1) 1px, transparent 1px)', backgroundSize: '40px 40px', transform: 'perspective(500px) rotateX(60deg) scale(2) translateY(-100px)', transformOrigin: 'top center', maskImage: 'linear-gradient(to bottom, transparent, black 40%, black 90%, transparent)' }}></div>
                    <div className="fixed inset-0 z-0 pointer-events-none">
                        <div className="absolute w-2 h-2 bg-emerald-500 rounded-full top-1/4 left-1/4 animate-ping opacity-20"></div>
                        <div className="absolute w-1 h-1 bg-cyan-500 rounded-full top-3/4 left-3/4 animate-ping opacity-30 delay-1000"></div>
                    </div>
                    
                    <Navbar />
                    
                    <main>
                        <HeroSection />
                        <AboutSection />
                        <ExperienceSection />
                        <SkillsSection />
                        <ProjectsSection />
                        <CertificationsAndBadges />
                        <EducationSection />
                        <ContactSection />
                    </main>

                    <ChatBot />
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
